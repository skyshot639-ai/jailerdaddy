    <!-- ✅ BONUS: CONVERSION TRACKING ON BUTTON CLICK -->
    <script>
    // This fires when user CLICKS the Telegram button
    // (Helps track real conversions, not fake clicks)
    document.addEventListener('DOMContentLoaded', function() {
        const joinBtn = document.getElementById('joinBtn');
        if (joinBtn) {
            joinBtn.addEventListener('click', function() {
                if (typeof fbq !== 'undefined') {
                    // Track Lead conversion
                    fbq('track', 'Lead', {
                        content_name: 'Jaguar Panel Join',
                        content_category: 'Telegram Channel',
                        currency: 'USD',
                        value: 1.00
                    });
                    
                    // Also track custom event
                    fbq('trackCustom', 'TelegramButtonClick', {
                        button_location: 'Main Page'
                    });
                    
                    console.log('✅ Meta Pixel: Lead event fired');
                }
            });
        }
        
        // Track when user stays on page for 5 seconds (engaged)
        setTimeout(function() {
            if (typeof fbq !== 'undefined') {
                fbq('trackCustom', 'PageEngagement', {
                    time_spent: '5_seconds',
                    page: 'Jaguar Panel Landing'
                });
                console.log('✅ Meta Pixel: Engagement event fired');
            }
        }, 5000);
    });

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet" />
    
    <style>
        /* ============================================
           ALL STYLES - NEON BLUE THEME
        ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: #0a0e27;
            overflow: hidden;
            position: relative;
        }

        /* Animated Neon Blue Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 150, 255, 0.15), transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 200, 255, 0.10), transparent 50%),
                radial-gradient(ellipse at 50% 20%, rgba(0, 100, 255, 0.08), transparent 50%),
                #0a0e27;
            animation: bgPulse 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgPulse {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.2) rotate(5deg);
                opacity: 1;
            }
        }

        /* Floating Neon Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 12s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(0, 150, 255, 0.12);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: rgba(0, 200, 255, 0.08);
            bottom: -80px;
            left: -80px;
            animation-delay: 4s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: rgba(0, 100, 255, 0.10);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 8s;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
            100% {
                transform: translate(10px, -10px) scale(1.05);
            }
        }

        /* Glowing Grid Lines */
        .grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .grid-lines::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 150, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(60px, 60px);
            }
        }

        /* Main Card - Glassmorphism */
        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(10, 14, 39, 0.60);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 44px 32px 36px;
            border: 1px solid rgba(0, 150, 255, 0.15);
            box-shadow: 
                0 30px 80px rgba(0, 100, 255, 0.15),
                inset 0 1px 0 rgba(0, 150, 255, 0.10),
                0 0 60px rgba(0, 100, 255, 0.05);
            position: relative;
            z-index: 2;
            animation: cardFloat 6s ease-in-out infinite;
            text-align: center;
        }

        @keyframes cardFloat {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        /* Glowing border animation */
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.3), transparent, rgba(0, 200, 255, 0.3));
            z-index: -1;
            animation: borderGlow 4s ease-in-out infinite alternate;
        }

        @keyframes borderGlow {
            0% {
                opacity: 0.3;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1.02);
            }
        }

        /* Logo - With Pulse Animation */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 12px;
        }

        .logo-wrapper::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            background: rgba(0, 150, 255, 0.10);
            animation: ringPulse 2.5s ease-in-out infinite;
            z-index: -1;
        }

        .logo-wrapper::after {
            content: '';
            position: absolute;
            top: -16px;
            left: -16px;
            right: -16px;
            bottom: -16px;
            border-radius: 50%;
            border: 2px solid rgba(0, 150, 255, 0.05);
            animation: ringPulse2 3s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes ringPulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.15);
                opacity: 1;
            }
        }

        @keyframes ringPulse2 {
            0%, 100% {
                transform: scale(1);
                opacity: 0.2;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(0, 150, 255, 0.30);
            box-shadow: 
                0 0 40px rgba(0, 150, 255, 0.15),
                inset 0 0 30px rgba(0, 150, 255, 0.05);
            animation: logoGlow 3s ease-in-out infinite alternate;
            display: block;
        }

        @keyframes logoGlow {
            0% {
                box-shadow: 0 0 30px rgba(0, 150, 255, 0.10), 0 0 60px rgba(0, 150, 255, 0.05);
                border-color: rgba(0, 150, 255, 0.20);
            }
            100% {
                box-shadow: 0 0 50px rgba(0, 150, 255, 0.25), 0 0 100px rgba(0, 150, 255, 0.10);
                border-color: rgba(0, 200, 255, 0.40);
            }
        }

        /* Brand Name - Neon Text */
        .brand-name {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #4dc9f6, #00a3ff, #4dc9f6);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: neonText 3s ease-in-out infinite alternate;
            text-shadow: 0 0 40px rgba(0, 150, 255, 0.10);
            margin-top: 4px;
        }

        @keyframes neonText {
            0% {
                background-position: 0% 50%;
                filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.10));
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(0, 150, 255, 0.20));
            }
            100% {
                background-position: 100% 50%;
                filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.10));
            }
        }

        .brand-sub {
            font-size: 12px;
            color: rgba(100, 200, 255, 0.40);
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 2px;
            animation: subFade 4s ease-in-out infinite;
        }

        @keyframes subFade {
            0%, 100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* Telegram Button - Premium Neon */
        .tg-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background: linear-gradient(135deg, #0099ff, #0066ff);
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            padding: 18px 24px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 8px 40px rgba(0, 100, 255, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.10);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            margin-top: 16px;
            position: relative;
            overflow: hidden;
            animation: btnFloat 3s ease-in-out infinite;
        }

        @keyframes btnFloat {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-3px);
            }
        }

        .tg-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        .tg-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 50px rgba(0, 100, 255, 0.40);
        }

        .tg-btn:active {
            transform: scale(0.96);
        }

        .tg-btn svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            fill: #fff;
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.10);
            }
        }

        /* Timer - Neon Style */
        .timer-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 14px;
            padding: 8px 16px;
            background: rgba(0, 100, 255, 0.04);
            border-radius: 60px;
            border: 1px solid rgba(0, 150, 255, 0.06);
        }

        .timer-icon {
            font-size: 16px;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .timer-text {
            font-size: 13px;
            color: rgba(150, 200, 255, 0.50);
            font-weight: 500;
        }

        .timer-count {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, #4dc9f6, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding: 0 12px;
            min-width: 36px;
            text-align: center;
            animation: timerPulse 1s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }

        /* ============================================
           RESPONSIVE
        ============================================ */
        @media (min-width: 768px) {
            .card {
                max-width: 480px;
                padding: 50px 40px 40px;
                border-radius: 56px;
            }
            .logo-img {
                width: 120px;
                height: 120px;
            }
            .brand-name {
                font-size: 38px;
            }
            .tg-btn {
                font-size: 20px;
                padding: 20px 28px;
            }
            .logo-wrapper::before {
                top: -10px;
                left: -10px;
                right: -10px;
                bottom: -10px;
            }
            .logo-wrapper::after {
                top: -20px;
                left: -20px;
                right: -20px;
                bottom: -20px;
            }
        }

        @media (max-width: 380px) {
            .card {
                padding: 32px 20px 28px;
                border-radius: 36px;
            }
            .logo-img {
                width: 76px;
                height: 76px;
            }
            .brand-name {
                font-size: 26px;
            }
            .tg-btn {
                font-size: 16px;
                padding: 14px 20px;
            }
            .timer-count {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND ORBS -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-lines"></div>

    <!-- MAIN CARD -->
    <div class="card">

        <!-- LOGO -->
        <div class="logo-wrapper">
            <img 
                src="https://jailerads.in/wp-content/uploads/2026/07/6266956119729180641-1.jpg" 
                alt="Jaguar Panel" 
                class="logo-img"
                id="logoImage"
                onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%230a0e27%22 stroke=%22%230099ff%22 stroke-width=%223%22/%3E%3Ctext x=%2250%22 y=%2260%22 text-anchor=%22middle%22 font-size=%2246%22 fill=%22%230099ff%22%3E🦁%3C/text%3E%3C/svg%3E'"
            />
        </div>

        <!-- BRAND NAME -->
        <div class="brand-name">🦁 JAGUAR PANEL</div>
        <div class="brand-sub">Premium Trading</div>

        <!-- TELEGRAM BUTTON -->
        <button class="tg-btn" id="joinBtn">
            <svg viewBox="0 0 24 24">
                <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
            </svg>
            Join Telegram
        </button>

        <!-- TIMER -->
        <div class="timer-section">
            <span class="timer-icon">⚡</span>
            <span class="timer-text">Redirect in</span>
            <span class="timer-count" id="timerDisplay">10</span>
            <span class="timer-text">sec</span>
        </div>

    </div>

    <!-- ============================================
    MAIN SCRIPT - REDIRECT + PIXEL TRACKING
    ============================================ -->
    <script>
        (function() {
            const TG_URL = 'https://t.me/+E0ASZ1crKLhkNDE1';
            const timerDisplay = document.getElementById('timerDisplay');
            const joinBtn = document.getElementById('joinBtn');

            let seconds = 10;
            let timerInterval = null;
            let redirected = false;
            let pixelFired = false;

            // ============================
            // REDIRECT FUNCTION
            // ============================
            function redirectToTG() {
                if (redirected) return;
                redirected = true;
                
                // 🔥 Fire pixel one last time before redirect (conversion)
                if (typeof fbq !== 'undefined' && !pixelFired) {
                    pixelFired = true;
                    fbq('track', 'Lead', {
                        content_name: 'Jaguar Panel Redirect',
                        content_category: 'Telegram Channel',
                        currency: 'USD',
                        value: 1.00
                    });
                    fbq('trackCustom', 'AutoRedirect', {
                        redirect_time: '10_seconds',
                        page: 'Jaguar Panel'
                    });
                    console.log('✅ Meta Pixel: Auto-redirect conversion fired');
                }
                
                // Redirect to Telegram
                window.location.href = TG_URL;
            }

            // ============================
            // TIMER FUNCTION
            // ============================
            function updateTimer() {
                timerDisplay.textContent = seconds;
            }

            function startCountdown() {
                if (timerInterval) clearInterval(timerInterval);
                seconds = 10;
                updateTimer();

                timerInterval = setInterval(function() {
                    seconds -= 1;
                    updateTimer();

                    if (seconds <= 0) {
                        clearInterval(timerInterval);
                        redirectToTG();
                    }
                }, 1000);
            }

            // ============================
            // BUTTON CLICK - MANUAL REDIRECT
            // ============================
            joinBtn.addEventListener('click', function(e) {
                e.preventDefault();
                
                // 🔥 Fire pixel on button click (manual conversion)
                if (typeof fbq !== 'undefined' && !pixelFired) {
                    pixelFired = true;
                    fbq('track', 'Lead', {
                        content_name: 'Jaguar Panel Button Click',
                        content_category: 'Telegram Channel',
                        currency: 'USD',
                        value: 1.00
                    });
                    fbq('trackCustom', 'ManualButtonClick', {
                        button_text: 'Join Telegram',
                        page: 'Jaguar Panel'
                    });
                    console.log('✅ Meta Pixel: Manual button click conversion fired');
                }
                
                redirectToTG();
            });

            // ============================
            // IMAGE LOAD TRACKING (Optional)
            // ============================
            const logoImg = document.getElementById('logoImage');
            if (logoImg) {
                logoImg.addEventListener('load', function() {
                    if (typeof fbq !== 'undefined') {
                        fbq('trackCustom', 'ImageLoaded', {
                            image_type: 'Logo',
                            page: 'Jaguar Panel'
                        });
                        console.log('✅ Meta Pixel: Image loaded event fired');
                    }
                });
            }

            // ============================
            // START EVERYTHING
            // ============================
            startCountdown();

            console.log('✅ Jaguar Panel - NEON BLUE THEME + Meta Pixel Loaded');
            console.log('✅ Pixel ID: 1587984616217588');
            console.log('✅ Tracking: PageView, Lead, Engagement, Custom Events');

        })();
    </script>

</body>
